name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Injeta o ID do contêiner do GTM (config, não segredo) a partir de uma
      # Variable do repositório/environment. Sem a Variable, o token permanece e
      # o site fica sem GTM — deploy seguro. Escopo por Environment permite
      # valores distintos (ex.: um Pages de staging no futuro).
      - name: Inject GTM container ID
        env:
          GTM_CONTAINER_ID: ${{ vars.GTM_CONTAINER_ID }}
        run: |
          if [ -n "$GTM_CONTAINER_ID" ]; then
            sed -i "s/__GTM_CONTAINER_ID__/${GTM_CONTAINER_ID}/g" site/assets/analytics.js
            echo "GTM container ID injetado (${GTM_CONTAINER_ID})."
          else
            echo "vars.GTM_CONTAINER_ID não definido — site publicado sem GTM."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
