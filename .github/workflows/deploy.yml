name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Injeta o ID do contêiner do GTM (config, não segredo) a partir de uma
      # Variable do repositório/environment. Sem a Variable, o token permanece e
      # o site fica sem GTM — deploy seguro. Escopo por Environment permite
      # valores distintos (ex.: um Pages de staging no futuro).
      - name: Inject GTM container ID
        env:
          GTM_CONTAINER_ID: ${{ vars.GTM_CONTAINER_ID }}
        run: |
          # Trim de espaços/quebras (coladas por engano na UI do GitHub) e validação
          # do formato ANTES do sed: um valor com "/" ou aspas não pode chegar ao
          # sed (quebraria o deploy), e um valor malformado falha em voz alta em vez
          # de ligar o analytics com um ID inválido. Sem Variable → publica sem GTM.
          id="$(printf '%s' "$GTM_CONTAINER_ID" | tr -d '[:space:]')"
          if [ -z "$id" ]; then
            echo "vars.GTM_CONTAINER_ID não definido — site publicado sem GTM."
          elif printf '%s' "$id" | grep -qE '^GTM-[A-Z0-9]+$'; then
            sed -i "s/__GTM_CONTAINER_ID__/${id}/g" site/assets/analytics.js
            echo "GTM container ID injetado (${id})."
          else
            echo "::warning::GTM_CONTAINER_ID inválido — esperado GTM-XXXXXXX. Publicando sem GTM."
          fi

      # Injeta a configuração do chat ao vivo do hero (assets/chat.js): o id do
      # agente público e a base da API. Não são segredos (vão em claro no browser
      # de qualquer widget público), mas ficam em Variables para não hardcodar. Sem
      # PUBLIC_AGENT_ID o token permanece e o site cai no fallback (ilustração
      # estática, sem bolinha) — deploy seguro. PUBLIC_API_BASE é opcional: se
      # ausente, o próprio chat.js usa https://api.lab019.ai.
      - name: Inject public chat config
        env:
          PUBLIC_AGENT_ID: ${{ vars.PUBLIC_AGENT_ID }}
          PUBLIC_API_BASE: ${{ vars.PUBLIC_API_BASE }}
        run: |
          # Trim e validação ANTES do sed: um valor com caractere inesperado não
          # pode chegar ao sed. Usamos "|" como delimitador (a base tem "://"), e
          # os charsets validados abaixo já excluem "|". Sem/ inválido → mantém o
          # token e o chat fica inerte (ou, para a base, cai no default do JS).
          id="$(printf '%s' "$PUBLIC_AGENT_ID" | tr -d '[:space:]')"
          if [ -z "$id" ]; then
            echo "vars.PUBLIC_AGENT_ID não definido — hero publicado como ilustração estática (sem chat ao vivo)."
          elif printf '%s' "$id" | grep -qE '^[A-Za-z0-9._:-]+$'; then
            sed -i "s|__PUBLIC_AGENT_ID__|${id}|g" site/assets/chat.js
            echo "PUBLIC_AGENT_ID injetado (${id})."
          else
            echo "::warning::PUBLIC_AGENT_ID inválido (esperado [A-Za-z0-9._:-]). Publicando sem chat ao vivo."
          fi

          base="$(printf '%s' "$PUBLIC_API_BASE" | tr -d '[:space:]' | sed 's:/*$::')"
          if [ -z "$base" ]; then
            echo "vars.PUBLIC_API_BASE não definido — chat.js usa o default https://api.lab019.ai."
          elif printf '%s' "$base" | grep -qE '^https?://[A-Za-z0-9.-]+(:[0-9]+)?$'; then
            sed -i "s|__PUBLIC_API_BASE__|${base}|g" site/assets/chat.js
            echo "PUBLIC_API_BASE injetado (${base})."
          else
            echo "::warning::PUBLIC_API_BASE inválido (esperado https://host). Usando o default do chat.js."
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
