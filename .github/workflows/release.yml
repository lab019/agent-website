name: release

# Versionamento SEMVER automatizado da plataforma LAB019: a cada push na main,
# calcula a próxima versão a partir dos Conventional Commits (fix → patch,
# feat → minor, BREAKING CHANGE/"!" → major), cria a tag vX.Y.Z e publica um
# GitHub Release com notas geradas. Commits docs/chore/refactor/test/ci não
# geram release. A tag git é a fonte de verdade da versão.

on:
  push:
    branches: [main]

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  tag:
    runs-on: ubuntu-latest
    outputs:
      new_tag: ${{ steps.semver.outputs.new_tag }}
      new_version: ${{ steps.semver.outputs.new_version }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: semver
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          tag_prefix: v
          default_bump: false

      - name: Publica o GitHub Release
        if: steps.semver.outputs.new_tag != ''
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.semver.outputs.new_tag }}
          generate_release_notes: true
